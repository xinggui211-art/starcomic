<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b35">
    <link rel="manifest" href="./manifest.json">
    <title>🌟 星漫</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #f5f5f5; color: #333; }
.navbar { background: #fff; display: flex; align-items: center; padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; gap: 6px; flex-wrap: wrap; }
.logo { font-size: 18px; font-weight: bold; color: #ff6b35; }
.nav-links { display: flex; gap: 2px; }
.nav-links a { text-decoration: none; color: #555; font-size: 12px; padding: 4px 8px; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.nav-links a:hover, .nav-links a.nav-active { color: #ff6b35; border-bottom-color: #ff6b35; }
.search-box { display: flex; flex: 1; min-width: 100px; }
.search-box input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 15px 0 0 15px; outline: none; width: 100%; font-size: 12px; }
.search-box button { padding: 6px 10px; background: #ff6b35; color: #fff; border: none; border-radius: 0 15px 15px 0; font-size: 12px; cursor: pointer; }
.btn-user { background: none; border: 1px solid #ddd; color: #555; padding: 5px 8px; border-radius: 14px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.btn-user.logged-in { background: #fff5f0; border-color: #ff6b35; color: #ff6b35; }
.container { max-width: 800px; margin: 0 auto; padding: 14px; }
.banner { background: linear-gradient(135deg, #ff6b35, #ff8c60); border-radius: 10px; padding: 24px 20px; color: #fff; margin-bottom: 16px; }
.banner h2 { font-size: 20px; margin-bottom: 4px; }
.tags { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tag { padding: 4px 10px; border-radius: 13px; font-size: 11px; background: #fff; border: 1px solid #ddd; cursor: pointer; white-space: nowrap; }
.tag.active, .tag:hover { background: #ff6b35; color: #fff; border-color: #ff6b35; }
.section-title { font-size: 17px; font-weight: bold; margin-bottom: 10px; }
.comic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
.comic-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s; position: relative; }
.comic-card:hover { transform: translateY(-3px); }
.comic-cover { width: 100%; aspect-ratio: 3/4; background: #e0e0e0; position: relative; overflow: hidden; }
.comic-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-fav-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
.comic-info { padding: 7px 9px; }
.comic-title { font-size: 12px; font-weight: bold; }
.comic-chapter { font-size: 10px; color: #999; }
.rank-badge { position: absolute; top: 6px; left: 6px; background: #ff6b35; color: #fff; font-size: 10px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; }
.rank-badge.gold { background: #f5a623; }
.rank-badge.silver { background: #a0a0a0; }
.rank-badge.bronze { background: #cd7f32; }
.footer { text-align: center; padding: 20px; color: #aaa; font-size: 12px; }
.reader-topbar { background: #222; color: #fff; display: flex; align-items: center; padding: 10px 14px; gap: 10px; position: sticky; top: 0; z-index: 10; }
.reader-topbar .reader-title { flex: 1; font-size: 14px; text-align: center; }
.reader-topbar .reader-page-info { font-size: 11px; color: #aaa; }
.btn-back { background: none; border: 1px solid #555; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.btn-fav { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 2px 4px; }
.reader-area { background: #111; min-height: 60vh; max-height: 70vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; touch-action: none; }
.reader-img-wrap { display: flex; align-items: center; justify-content: center; max-width: 100%; max-height: 100%; padding: 8px; }
.reader-img-wrap img { max-width: 100%; max-height: 68vh; object-fit: contain; border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform 0.15s ease-out; }
.reader-tip { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 11px; pointer-events: none; transition: opacity 0.8s; }
.reader-tip.hide { opacity: 0; }
.reader-controls { background: #1a1a1a; display: flex; align-items: center; justify-content: center; gap: 18px; padding: 12px; }
.chapter-name { color: #ccc; font-size: 12px; }
.btn-page { background: #ff6b35; color: #fff; border: none; padding: 9px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-page:active { background: #e55a2b; }
.comment-section { background: #1a1a1a; padding: 14px 16px; border-top: 1px solid #333; }
.comment-header { display: flex; justify-content: space-between; align-items: center; color: #ccc; font-size: 14px; margin-bottom: 10px; }
.btn-refresh-comment { background: none; border: none; color: #999; font-size: 14px; cursor: pointer; }
.comment-list { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
.comment-item { background: #252525; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; color: #ddd; }
.comment-item .comment-user { font-size: 12px; color: #ff6b35; font-weight: bold; margin-bottom: 3px; }
.comment-item .comment-text { font-size: 13px; line-height: 1.4; }
.comment-item .comment-time { font-size: 10px; color: #666; margin-top: 4px; }
.comment-empty { text-align: center; color: #666; padding: 20px; font-size: 13px; }
.comment-input-row { display: flex; gap: 8px; }
.comment-input-row input { flex: 1; padding: 10px 12px; border: 1px solid #444; border-radius: 20px; background: #252525; color: #fff; font-size: 13px; outline: none; }
.comment-input-row input::placeholder { color: #666; }
.comment-input-row button { padding: 10px 16px; background: #ff6b35; color: #fff; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; }
.comment-replies { margin-left: 20px; border-left: 2px solid #ff6b35; padding-left: 10px; }
.comment-reply-item { background: #1f1f1f; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; color: #ddd; }
.comment-reply-item .comment-user { font-size: 11px; color: #ff6b35; font-weight: bold; }
.comment-reply-item .comment-text { font-size: 12px; margin: 2px 0; }
.comment-reply-item .comment-time { font-size: 10px; color: #555; }
.comment-reply-btn { background: none; border: none; color: #888; font-size: 11px; cursor: pointer; padding: 0; margin-top: 4px; }
.comment-reply-btn:hover { color: #ff6b35; }
.reply-indicator { background: #2a2a2a; color: #ff6b35; font-size: 11px; padding: 4px 10px; border-radius: 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.reply-indicator button { background: none; border: none; color: #999; cursor: pointer; font-size: 14px; }
.import-overlay-inner { background: #fff; border-radius: 12px; padding: 24px 20px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
.import-overlay-inner textarea { width: 100%; height: 140px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; resize: vertical; outline: none; margin-bottom: 10px; }
.import-url-row { display: flex; gap: 8px; margin-bottom: 10px; }
.import-url-row input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; outline: none; }
.btn-sm { padding: 8px 14px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; }
.btn-import { width: 100%; padding: 12px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-bottom: 8px; }
.btn-reset { width: 100%; padding: 10px; background: #fff; color: #e53935; border: 1px solid #e53935; border-radius: 8px; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body><!-- 导入弹窗 -->
<div id="importOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;">
    <div class="import-overlay-inner">
        <div style="font-size:18px;font-weight:bold;margin-bottom:14px;">📥 导入数据源</div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">方式一：粘贴 JSON 数据</div>
        <textarea id="importJSON" placeholder='[&#10;  {"id":1,"title":"漫画名","chapter":"第1话","tag":"分类"},&#10;  {"id":2,"title":"第二部","chapter":"第20话","tag":"都市"}&#10;]'></textarea>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">方式二：输入 JSON 数据源网址</div>
        <div class="import-url-row">
            <input type="text" id="importURL" placeholder="https://example.com/comics.json">
            <button class="btn-sm" style="background:#666;color:#fff;" onclick="fetchAndImport()">获取</button>
        </div>
        <button class="btn-import" onclick="doImport()">📥 导入 JSON 数据</button>
        <button class="btn-reset" onclick="resetComics()">🔄 恢复默认漫画库</button>
        <div style="font-size:11px;color:#999;margin-top:10px;text-align:center;" id="importMsg"></div>
        <button onclick="closeImport()" style="margin-top:10px;background:none;border:none;color:#999;font-size:13px;cursor:pointer;width:100%;">取消</button>
    </div>
</div>

<!-- 登录弹窗 -->
<div id="loginOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:30px 24px;width:90%;max-width:360px;text-align:center;">
        <div style="font-size:40px;margin-bottom:8px;">👤</div>

        <input type="text" id="loginUsername" placeholder="输入用户名" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;font-size:14px;outline:none;">
        <input type="password" id="loginPassword" placeholder="输入密码（至少4位）" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:20px;font-size:14px;outline:none;">
        <button onclick="doLogin()" style="width:100%;padding:12px;background:#ff6b35;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-bottom:8px;">登 录</button>
        <button onclick="doRegister()" style="width:100%;padding:12px;background:#fff;color:#ff6b35;border:2px solid #ff6b35;border-radius:8px;font-size:16px;cursor:pointer;">注 册</button>
        <div style="margin-top:12px;font-size:12px;color:#999;" id="loginMsg"></div>
        <button onclick="closeLogin()" style="margin-top:12px;background:none;border:none;color:#999;font-size:13px;cursor:pointer;">取消</button>
    </div>
</div>

<!-- 首页 -->
<div id="homePage">
    <nav class="navbar">

    <div class="container" id="homeContent">

        <div class="tags" id="tagArea">
            <span class="tag active" onclick="filterTag(this)">全部</span><span class="tag" onclick="filterTag(this)">玄幻</span><span class="tag" onclick="filterTag(this)">都市</span><span class="tag" onclick="filterTag(this)">恋爱</span><span class="tag" onclick="filterTag(this)">科幻</span><span class="tag" onclick="filterTag(this)">悬疑</span><span class="tag" onclick="filterTag(this)">热血</span><span class="tag" onclick="filterTag(this)">搞笑</span><span class="tag" onclick="filterTag(this)">古风</span><span class="tag" onclick="filterTag(this)">奇幻</span><span class="tag" onclick="filterTag(this)">冒险</span>
        </div>

        <div class="comic-grid" id="comicGrid"></div>
        <div id="emptyMsg" style="display:none;text-align:center;color:#999;padding:60px;">😢 暂无内容</div>
    </div>

</div>

<!-- 阅读器 -->
<div id="readerPage" style="display:none;">
    <div class="reader-topbar">
        <button class="btn-back" onclick="goHome()">← 返回</button>
        <span class="reader-title" id="readerTitle">漫画标题</span>
        <button class="btn-fav" id="btnFavInReader" onclick="toggleFavInReader()">🤍</button>
        <span class="reader-page-info" id="pageInfo">1 / 5</span>
    </div>
    <div class="reader-area" id="readerArea">
        <div class="reader-img-wrap"><img id="readerImg" src="" alt="漫画页"></div>
        <div class="reader-tip" id="readerTip">← 滑动翻页 →  |  双指缩放  |  双击放大</div>
    </div>
    <div class="reader-controls">
        <button class="btn-page" onclick="prevPage()">◀ 上一页</button>
        <span class="chapter-name" id="chapterName">第1话</span>
        <button class="btn-page" onclick="nextPage()">下一页 ▶</button>
    </div>
    <div class="comment-section" id="commentSection">
        <div class="comment-header"><span>💬 评论 (<span id="commentCount">0</span>)</span><button class="btn-refresh-comment" onclick="loadComments()">🔄</button></div>
        <div class="comment-list" id="commentList"><div style="text-align:center;color:#999;padding:20px;">暂无评论</div></div>
        <div class="comment-input-row"><input type="text" id="commentInput" placeholder="写下你的评论..." maxlength="200"><button onclick="sendComment()">发送</button></div>
    </div>
</div><script>
// ========== localStorage 后端 ==========
const FAKE_DELAY = 50;
function delay() { return new Promise(r => setTimeout(r, FAKE_DELAY)); }
async function getAllUsers() { await delay(); return JSON.parse(localStorage.getItem("db_users") || "{}"); }
async function saveAllUsers(users) { await delay(); localStorage.setItem("db_users", JSON.stringify(users)); }
async function getFavData() { await delay(); return JSON.parse(localStorage.getItem("db_favs") || "[]"); }
async function saveFavData(data) { await delay(); localStorage.setItem("db_favs", JSON.stringify(data)); }
async function getHistoryData() { await delay(); return JSON.parse(localStorage.getItem("db_hist") || "[]"); }
async function saveHistoryData(data) { await delay(); localStorage.setItem("db_hist", JSON.stringify(data)); }
async function getCommentData() { await delay(); return JSON.parse(localStorage.getItem("db_comments") || "[]"); }
async function saveCommentData(data) { await delay(); localStorage.setItem("db_comments", JSON.stringify(data)); }
async function getNextCommentId() { const all = await getCommentData(); if (all.length === 0) return 1; return Math.max(...all.map(c => c.id || 0)) + 1; }

// ========== 默认漫画 ==========
const DEFAULT_COMICS = [
    { id: 1, title: "仙王的日常生活", chapter: "第320话", tag: "玄幻" },
    { id: 2, title: "都市极品神医", chapter: "第188话", tag: "都市" },
    { id: 3, title: "星河漫步", chapter: "第56话", tag: "科幻" },
    { id: 4, title: "甜蜜契约", chapter: "第102话", tag: "恋爱" },
    { id: 5, title: "暗夜追踪", chapter: "第77话", tag: "悬疑" },
    { id: 6, title: "剑来", chapter: "第215话", tag: "玄幻" },
    { id: 7, title: "总裁在上", chapter: "第140话", tag: "都市" },
    { id: 8, title: "机械纪元", chapter: "第39话", tag: "科幻" },
    { id: 9, title: "热血高校", chapter: "第263话", tag: "热血" },
    { id: 10, title: "爆笑江湖", chapter: "第91话", tag: "搞笑" },
    { id: 11, title: "龙族崛起", chapter: "第48话", tag: "奇幻" },
    { id: 12, title: "全职法师", chapter: "第302话", tag: "玄幻" },
    { id: 13, title: "狐妖小红娘", chapter: "第156话", tag: "恋爱" },
    { id: 14, title: "星海征程", chapter: "第63话", tag: "冒险" },
    { id: 15, title: "心理罪", chapter: "第85话", tag: "悬疑" },
    { id: 16, title: "镇魂街", chapter: "第198话", tag: "热血" },
    { id: 17, title: "西行纪", chapter: "第112话", tag: "古风" },
    { id: 18, title: "一人之下", chapter: "第230话", tag: "玄幻" },
    { id: 19, title: "斗破苍穹", chapter: "第410话", tag: "玄幻" },
    { id: 20, title: "凤囚凰", chapter: "第89话", tag: "古风" },
];

// ========== 动态漫画数据 ==========
let comics = loadComics();

function loadComics() {
    const saved = localStorage.getItem("imported_comics");
    if (saved) {
        try {
            const arr = JSON.parse(saved);
            if (Array.isArray(arr) && arr.length > 0) return arr.map((c, i) => ({ id: c.id || i + 1, title: c.title || "未知", chapter: c.chapter || "连载中", tag: c.tag || "其他" }));
        } catch (e) {}
    }
    return [...DEFAULT_COMICS];
}

function saveComics(arr) { localStorage.setItem("imported_comics", JSON.stringify(arr)); }

function resetComics() { localStorage.removeItem("imported_comics"); comics = loadComics(); closeImport(); renderTagList(); renderComics("全部"); document.getElementById("importMsg").textContent = "✅ 已恢复默认漫画库"; setTimeout(() => { document.getElementById("importMsg").textContent = ""; }, 2000); }

// ========== 动态标签 ==========
function getAllTags() { const set = new Set(); comics.forEach(c => { if (c.tag) set.add(c.tag); }); return Array.from(set); }
function renderTagList() {
    const tags = getAllTags();
    const container = document.getElementById("tagArea");
    container.innerHTML = '<span class="tag active" onclick="filterTag(this)">全部</span>' + tags.map(t => `<span class="tag" onclick="filterTag(this)">${t}</span>`).join("");
}

// ========== 导入功能 ==========
function openImport() { document.getElementById("importOverlay").style.display = "flex"; document.getElementById("importJSON").value = ""; document.getElementById("importURL").value = ""; document.getElementById("importMsg").textContent = ""; }
function closeImport() { document.getElementById("importOverlay").style.display = "none"; }

function doImport() {
    const raw = document.getElementById("importJSON").value.trim();
    if (!raw) { document.getElementById("importMsg").textContent = "⚠️ 请粘贴 JSON 数据"; return; }
    try {
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr) || arr.length === 0) { document.getElementById("importMsg").textContent = "⚠️ JSON 必须是非空数组"; return; }
        saveComics(arr);
        comics = loadComics();
        closeImport();
        renderTagList();
        renderComics("全部");
        alert(`✅ 成功导入 ${comics.length} 部漫画！`);
    } catch (e) {
        document.getElementById("importMsg").textContent = "⚠️ JSON 格式错误：" + e.message;
    }
}

async function fetchAndImport() {
    const url = document.getElementById("importURL").value.trim();
    if (!url) { document.getElementById("importMsg").textContent = "⚠️ 请输入网址"; return; }
    document.getElementById("importMsg").textContent = "⏳ 正在获取...";
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const arr = await res.json();
        if (!Array.isArray(arr) || arr.length === 0) { document.getElementById("importMsg").textContent = "⚠️ 返回数据不是有效数组"; return; }
        saveComics(arr);
        comics = loadComics();
        closeImport();
        renderTagList();
        renderComics("全部");
        alert(`✅ 成功从云端导入 ${comics.length} 部漫画！`);
    } catch (e) {
        document.getElementById("importMsg").textContent = "⚠️ 获取失败：" + e.message;
    }
}

// ========== 漫画封面 ==========
function coverUrl(comicId) { return `https://picsum.photos/seed/comic${comicId}/300/400`; }
function pageImgUrl(comicId, pageNum) { return `https://picsum.photos/seed/comic${comicId}_p${pageNum}/600/800`; }
function getTotalPages() { return 5; }

// ========== 状态 ==========
let currentUser = null, favList = [], currentView = "home", currentComic = null, currentPage = 0;
let readerScale = 1, readerTranslateX = 0, readerTranslateY = 0, replyTo = null;

// ========== 业务 API ==========
async function apiRegister(username, password) { const users = await getAllUsers(); if (users[username]) return { ok: false, msg: "该用户名已被注册" }; users[username] = { password, createdAt: Date.now() }; await saveAllUsers(users); return { ok: true, msg: "✅ 注册成功！请登录" }; }
async function apiLogin(username, password) { const users = await getAllUsers(); if (!users[username] || users[username].password !== password) return { ok: false }; return { ok: true }; }
async function apiGetFavorites(username) { const all = await getFavData(); return all.filter(f => f.username === username).map(f => f.comic_id); }
async function apiAddFavorite(username, comicId) { const all = await getFavData(); all.push({ username, comic_id: comicId }); await saveFavData(all); }
async function apiRemoveFavorite(username, comicId) { let all = await getFavData(); all = all.filter(f => !(f.username === username && f.comic_id === comicId)); await saveFavData(all); }
async function apiGetHistory(username) { const all = await getHistoryData(); return all.filter(h => h.username === username).sort((a, b) => b.viewed_at - a.viewed_at).slice(0, 20).map(h => ({ id: h.comic_id, time: h.viewed_at })); }
async function apiAddHistory(username, comicId) { let all = await getHistoryData(); all = all.filter(h => !(h.username === username && h.comic_id === comicId)); all.push({ username, comic_id: comicId, viewed_at: Date.now() }); if (all.length > 100) all = all.slice(-100); await saveHistoryData(all); }
async function apiGetComments(comicId) { const all = await getCommentData(); return all.filter(c => c.comic_id === comicId).sort((a, b) => a.time - b.time); }
async function apiAddComment(comicId, username, text, parentId, parentUsername) { const id = await getNextCommentId(); const all = await getCommentData(); all.push({ id, comic_id: comicId, username, text, time: Date.now(), parent_id: parentId || null, parent_username: parentUsername || null }); await saveCommentData(all); }
async function apiGetRanking() { const allFavs = await getFavData(); const countMap = {}; allFavs.forEach(f => { countMap[f.comic_id] = (countMap[f.comic_id] || 0) + 1; }); return comics.map(c => ({ ...c, favCount: countMap[c.id] || 0 })).filter(c => c.favCount > 0).sort((a, b) => b.favCount - a.favCount).slice(0, 20); }
function timeAgo(ts) { /60) return "刚刚"; if (sec < 3600) return Math.floor(sec / 60) + "分钟前"; if (sec < 86400) return Math.floor(sec / 3600) + "小时前"; return Math.floor(sec / 86400) + "天前"; }

// ========== UI ==========
function openLogin() { if (currentUser) { if (confirm(`确定要退出「${currentUser}」吗？`)) logout(); return; } document.getElementById("loginOverlay").style.display = "flex"; document.getElementById("loginUsername").value = ""; document.getElementById("loginPassword").value = ""; document.getElementById("loginMsg").textContent = ""; }
function closeLogin() { document.getElementById("loginOverlay").style.display = "none"; }
async function doRegister() { const u = document.getElementById("loginUsername").value.trim(); const p = document.getElementById("loginPassword").value.trim(); if (!u || !p) { document.getElementById("loginMsg").textContent = "⚠️ 不能为空"; return; } if (p.length < 4) { document.getElementById("loginMsg").textContent = "⚠️ 密码至少4位"; return; } document.getElementById("loginMsg").textContent = "正在注册..."; const r = await apiRegister(u, p); document.getElementById("loginMsg").textContent = r.msg; }
async function doLogin() { const u = document.getElementById("loginUsername").value.trim(); const p = document.getElementById("loginPassword").value.trim(); document.getElementById("loginMsg").textContent = "正在登录..."; const r = await apiLogin(u, p); if (!r.ok) { document.getElementById("loginMsg").textContent = "⚠️ 用户名或密码错误"; return; } currentUser = u; favList = await apiGetFavorites(u); updateUserUI(); closeLogin(); if (currentView === "favorites") showFavorites(); else if (currentView === "history") showHistory(); else if (currentView === "ranking") showRanking(); else renderComics("全部"); }
function logout() { currentUser = null; favList = []; updateUserUI(); renderComics("全部"); switchNav("home"); currentView = "home"; }
function updateUserUI() { const btn = document.getElementById("btnUser"); if (currentUser) { btn.textContent = `👤 ${currentUser}`; btn.className = "btn-user logged-in"; } else { btn.textContent = "👤 登录"; btn.className = "btn-user"; } }

// ========== 渲染 ==========
function isFav(id) { return favList.includes(id); }
function makeComicCard(c, rank) { const loved = isFav(c.id); const favBtn = currentUser ? `<button class="card-fav-btn" onclick="event.stopPropagation();toggleFavCard(${c.id},this)">${loved ? '❤️' : '🤍'}</button>` : ""; const badge = rank ? `<span class="rank-badge ${rank===1?'gold':rank===2?'silver':rank===3?'bronze':''}">${rank}</span>` : ""; const extra = c.favCount !== undefined ? `<div class="comic-chapter">❤️ ${c.favCount} 人收藏</div>` : `<div class="comic-chapter">${c.chapter}</div>`; return `<div class="comic-card"><div class="comic-cover" onclick="openComic(${c.id})"><img src="${coverUrl(c.id)}" alt="${c.title}" loading="lazy">${badge}${favBtn}</div><div class="comic-info" onclick="openComic(${c.id})"><div class="comic-title">${c.title}</div>${extra}</div></div>`; }
function renderList(list, title, showBanner, showTags, showRank) { document.getElementById("sectionTitle").textContent = title; document.getElementById("bannerArea").style.display = showBanner ? "block" : "none"; document.getElementById("tagArea").style.display = showTags ? "flex" : "none"; const grid = document.getElementById("comicGrid"); const empty = document.getElementById("emptyMsg"); if (list.length === 0) { grid.innerHTML = ""; empty.style.display = "block"; empty.innerHTML = currentUser ? "😢 暂无内容" : "😢 请先登录"; } else { empty.style.display = "none"; grid.innerHTML = list.map((c, i) => makeComicCard(c, showRank ? i + 1 : null)).join(""); } }
function renderComics(tag) { currentView = "home"; renderList(tag==="全部" ? comics : comics.filter(c=>c.tag===tag), "🔥 热门漫画", true, true, false); switchNav("home"); }
function filterTag(el) { document.querySelectorAll(".tag").forEach(t => t.classList.remove("active")); el.classList.add("active"); renderComics(el.textContent); }
async function showFavorites() { currentView = "favorites"; if (!currentUser) { openLogin(); return; } favList = await apiGetFavorites(currentUser); renderList(comics.filter(c => favList.includes(c.id)), "❤️ 我的收藏", false, false, false); switchNav("fav"); }
async function showHistory() { currentView = "history"; if (!currentUser) { openLogin(); return; } const his = await apiGetHistory(currentUser); const hisComics = his.map(h => { const c = comics.find(co => co.id === h.id); return c || { id: h.id, title: "未知", chapter: "", tag: "" }; }); renderList(hisComics, "🕐 阅读历史", false, false, false); switchNav("his"); }
async function showRanking() { currentView = "ranking"; const ranked = await apiGetRanking(); renderList(ranked, "🏆 收藏排行榜", false, false, true); switchNav("rank"); }
function switchNav(active) { ["Home","Fav","His","Rank"].forEach(s => { document.getElementById("nav"+s).classList.toggle("nav-active", active === s.toLowerCase()); }); }
async function toggleFavCard(comicId, btn) { if (!currentUser) { openLogin(); return; } if (favList.includes(comicId)) { await apiRemoveFavorite(currentUser, comicId); favList = favList.filter(id => id !== comicId); btn.innerHTML = "🤍"; } else { await apiAddFavorite(currentUser, comicId); favList.push(comicId); btn.innerHTML = "❤️"; } if (currentView === "favorites") showFavorites(); else if (currentView === "ranking") showRanking(); }
async function toggleFavInReader() { if (!currentUser || !currentComic) return; const btn = document.getElementById("btnFavInReader"); if (favList.includes(currentComic.id)) { await apiRemoveFavorite(currentUser, currentComic.id); favList = favList.filter(id => id !== currentComic.id); btn.textContent = "🤍"; } else { await apiAddFavorite(currentUser, currentComic.id); favList.push(currentComic.id); btn.textContent = "❤️"; } }
function searchComic() { currentView = "home"; const kw = document.getElementById("searchInput").value.trim(); if (!kw) return renderComics("全部"); const results = comics.filter(c => c.title.includes(kw)); if (results.length === 0) { document.getElementById("bannerArea").style.display = "none"; document.getElementById("tagArea").style.display = "none"; document.getElementById("sectionTitle").textContent = "🔍 搜索结果"; document.getElementById("comicGrid").innerHTML = ""; document.getElementById("emptyMsg").style.display = "block"; document.getElementById("emptyMsg").innerHTML = "😢 没找到"; } else { renderList(results, "🔍 搜索结果", false, false, false); } switchNav("home"); }

// ========== 阅读器 ==========
async function openComic(comicId) { if (!currentUser) { openLogin(); return; } currentComic = comics.find(c => c.id === comicId); currentPage = 0; readerScale = 1; readerTranslateX = 0; readerTranslateY = 0; replyTo = null; await apiAddHistory(currentUser, comicId); document.getElementById("homePage").style.display = "none"; document.getElementById("readerPage").style.display = "block"; document.getElementById("readerTitle").textContent = currentComic.title; document.getElementById("chapterName").textContent = currentComic.chapter; document.getElementById("btnFavInReader").textContent = isFav(comicId) ? "❤️" : "🤍"; document.getElementById("readerTip").classList.remove("hide"); setTimeout(() => document.getElementById("readerTip").classList.add("hide"), 4000); window.scrollTo(0, 0); updateReader(); loadComments(); }
function updateReader() { const total = getTotalPages(); document.getElementById("readerImg").src = pageImgUrl(currentComic.id, currentPage + 1); document.getElementById("pageInfo").textContent = `${currentPage + 1} / ${total}`; readerScale = 1; readerTranslateX = 0; readerTranslateY = 0; applyReaderTransform(); document.querySelectorAll(".btn-page")[0].style.opacity = currentPage === 0 ? 0.3 : 1; document.querySelectorAll(".btn-page")[1].style.opacity = currentPage === total - 1 ? 0.3 : 1; }
function applyReaderTransform() { document.getElementById("readerImg").style.transform = `translate(${readerTranslateX}px, ${readerTranslateY}px) scale(${readerScale})`; }
function nextPage() { if (currentPage < getTotalPages() - 1) { currentPage++; updateReader(); } }
function prevPage() { if (currentPage > 0) { currentPage--; updateReader(); } }

// ========== 评论区 ==========
function renderReplyIndicator() { const container = document.querySelector(".comment-input-row"); const old = document.getElementById("replyIndicator"); if (old) old.remove(); if (replyTo) { const div = document.createElement("div"); div.id = "replyIndicator"; div.className = "reply-indicator"; div.innerHTML = `回复 @${replyTo.username} <button onclick="cancelReply()">✕</button>`; container.parentNode.insertBefore(div, container); } }
function cancelReply() { replyTo = null; const old = document.getElementById("replyIndicator"); if (old) old.remove(); document.getElementById("commentInput").placeholder = "写下你的评论..."; }
async function loadComments() { if (!currentComic) return; const allComments = await apiGetComments(currentComic.id); const topComments = allComments.filter(c => !c.parent_id); const replies = allComments.filter(c => c.parent_id); document.getElementById("commentCount").textContent = allComments.length; const list = document.getElementById("commentList"); if (allComments.length === 0) { list.innerHTML = '<div class="comment-empty">💬 暂无评论，来说两句吧~</div>'; return; } list.innerHTML = topComments.map(c => { const childReplies = replies.filter(r => r.parent_id === c.id); const replyHTML = childReplies.map(r => `<div class="comment-reply-item"><div class="comment-user">${r.username} → ${r.parent_username}</div><div class="comment-text">${r.text}</div><div class="comment-time">${timeAgo(r.time)}</div><button class="comment-reply-btn" onclick="startReply(${c.id}, '${c.username}')">回复</button></div>`).join(""); return `<div class="comment-item"><div class="comment-user">${c.username}</div><div class="comment-text">${c.text}</div><div class="comment-time">${timeAgo(c.time)}</div><button class="comment-reply-btn" onclick="startReply(${c.id}, '${c.username}')">回复</button>${childReplies.length > 0 ? `<div class="comment-replies">${replyHTML}</div>` : ""}</div>`; }).join(""); }
function startReply(commentId, username) { replyTo = { id: commentId, username }; document.getElementById("commentInput").placeholder = `回复 @${username}：`; document.getElementById("commentInput").focus(); renderReplyIndicator(); }
async function sendComment() { if (!currentUser) { alert("请先登录"); return; } const input = document.getElementById("commentInput"); const text = input.value.trim(); if (!text) return; if (text.length > 200) { alert("评论最多200字"); return; } await apiAddComment(currentComic.id, currentUser, text, replyTo ? replyTo.id : null, replyTo ? replyTo.username : null); input.value = ""; replyTo = null; cancelReply(); loadComments(); }

// ========== 触摸交互 ==========
(function initTouch() {
    const area = document.getElementById("readerArea");
    let startX = 0, startY = 0, startTransX = 0, startTransY = 0, startScale = 1, startDist = 0, isPinching = false, moved = false;
    area.addEventListener("touchstart", (e) => { if (!currentComic) return; if (e.touches.length === 1) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; isPinching = false; moved = false; startTransX = readerTranslateX; startTransY = readerTranslateY; } else if (e.touches.length === 2) { isPinching = true; startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); startScale = readerScale; } }, { passive: false });
    area.addEventListener("touchmove", (e) => { if (!currentComic) return; if (isPinching && e.touches.length === 2) { e.preventDefault(); const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); readerScale = Math.max(1, Math.min(3, startScale * (dist / startDist))); applyReaderTransform(); } else if (!isPinching && e.touches.length === 1) { const dx = e.touches[0].clientX - startX; if (Math.abs(dx) > 8) moved = true; if (readerScale > 1) { readerTranslateX = startTransX + dx; readerTranslateY = startTransY + (e.touches[0].clientY - startY); applyReaderTransform(); } } }, { passive: false });
    area.addEventListener("touchend", (e) => { if (!currentComic) return; if (!isPinching && moved && readerScale === 1) { const dx = (e.changedTouches[0]?.clientX || startX) - startX; if (dx < -50) nextPage(); else if (dx > 50) prevPage(); } startTransX = readerTranslateX; startTransY = readerTranslateY; isPinching = false; moved = false; });
    area.addEventListener("dblclick", () => { if (!currentComic) return; if (readerScale > 1) { readerScale = 1; readerTranslateX = 0; readerTranslateY = 0; } else { readerScale = 2; } applyReaderTransform(); startTransX = readerTranslateX; startTransY = readerTranslateY; });
})();

function goHome() { document.getElementById("readerPage").style.display = "none"; document.getElementById("homePage").style.display = "block"; if (currentView === "favorites") showFavorites(); else if (currentView === "history") showHistory(); else if (currentView === "ranking") showRanking(); else renderComics("全部"); currentComic = null; }

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').then(() => console.log('✅ PWA 就绪')).catch(e => console.log('SW:', e.message)); }

updateUserUI();
renderComics("全部");
</script>
